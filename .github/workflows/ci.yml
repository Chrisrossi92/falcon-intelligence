name: CI

on:
  push:
  pull_request:

jobs:
  validation:
    name: Falcon Intelligence validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src scripts tests

      - name: Smoke synthetic fixtures
        run: PYTHONPATH=src python scripts/smoke_synthetic_fixtures.py

      - name: Smoke synthetic intelligence matcher
        run: PYTHONPATH=src python scripts/smoke_synthetic_intelligence_matcher.py

      - name: Smoke UI card schema
        run: PYTHONPATH=src python scripts/smoke_intelligence_card_schema.py

      - name: Smoke UI card CLI
        run: PYTHONPATH=src python scripts/smoke_intelligence_card_cli.py

      - name: Smoke UI card snapshot
        run: PYTHONPATH=src python scripts/smoke_intelligence_card_snapshot.py

      - name: Smoke Falcon API contract
        run: PYTHONPATH=src python scripts/smoke_falcon_api_contract.py

      - name: Smoke match audit events
        run: PYTHONPATH=src python scripts/smoke_match_audit.py

      - name: Run pytest
        run: PYTHONPATH=src python -m pytest
